model:
  type: token-retrieval
  path: Qwen/Qwen2-7B-Instruct
  rope_base: 1000000
  rope_scale: 1
  n_init: 128
  n_local: 512
  top_k: 8192
  max_n_tokens: 1048576
  adaptive_topk: false
  attention_threshold: 0.9
  l2_norm_pooling: false
  weighted_soft_vote: false
  union_of_sets: false
  dynamic_capacity_union: false
  head_wise_adaptive: false
  dcu_energy_mode: "both"
  # --- THÔNG SỐ VÀNG PROFILING ---
  alpha_256: 1.2000  # (Hạ từ 1.25 xuống 1.2 để vớt trọn kim của KV)
  alpha_512: 1.0500  # (Hạ xuống để vớt các manh mối phụ)
  alpha_1024: 1.0100 
  alpha_2048: 0.9800 # (Vẫn giữ 0.98 để lướt qua 50% rác tuyệt đối)

max_len: 1048576
chunk_size: 8192
conv_type: qwen
truncation: suffix
dtype: bfloat16
