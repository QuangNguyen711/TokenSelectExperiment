model:
  type: token-retrieval
  path: Qwen/Qwen2-7B-Instruct
  rope_base: 1000000
  rope_scale: 1
  n_init: 128
  n_local: 512
  top_k: 8192
  max_n_tokens: 1048576
  adaptive_topk: false  # Enable adaptive top-k based on attention mass
  attention_threshold: 0.9  # Stop when cumulative attention reaches this threshold (only used when adaptive_topk=true)

max_len: 1048576
chunk_size: 8192
conv_type: qwen
truncation: suffix
dtype: bfloat16